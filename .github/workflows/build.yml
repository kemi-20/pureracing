name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build Desktop distributable
        run: gradle :composeApp:createReleaseDistributable --stacktrace
      - name: Upload Desktop distributable
        uses: actions/upload-artifact@v4
        with:
          name: racingdaily-windows
          path: composeApp/build/compose/binaries/main-release/app/**
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build Android Debug APK
        run: gradle :composeApp:assembleDebug --stacktrace
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: racingdaily-android-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
