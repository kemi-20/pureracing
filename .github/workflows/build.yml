name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Desktop distributable
        shell: bash
        run: bash ./gradlew :composeApp:createDistributable --stacktrace
      - name: Upload Desktop distributable
        uses: actions/upload-artifact@v4
        with:
          name: racingdaily-windows
          path: composeApp/build/compose/binaries/main/app/**
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode Android signing key
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > composeApp/release-keystore.jks
      - name: Build signed Android Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/composeApp/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --stacktrace
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: racingdaily-android-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
