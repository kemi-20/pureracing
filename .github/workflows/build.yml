name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Both enhanced and basic providers currently emit Windows runner
          # path/tar warnings. Keep Android caching enabled and disable it here.
          cache-disabled: true
      - name: Build Desktop distributable
        shell: bash
        run: bash ./gradlew :composeApp:createDistributable --stacktrace
      - name: Sign Windows executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            Write-Host "WINDOWS_CERTIFICATE_BASE64 is not configured; publishing an unsigned Windows build."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE_PASSWORD must be configured with the Windows certificate."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "pureracing-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          )

          $signTool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signTool) {
            $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
              -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object FullName -Match '\\x64\\signtool\.exe$' |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signTool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          $executable = "composeApp\build\compose\binaries\main\app\PureRacing\PureRacing.exe"
          if (-not (Test-Path -LiteralPath $executable)) {
            throw "PureRacing.exe was not generated at the expected path."
          }

          & $signTool sign /fd SHA256 /f $certificatePath `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /tr "http://timestamp.digicert.com" /td SHA256 $executable
          if ($LASTEXITCODE -ne 0) { throw "Windows executable signing failed." }

          & $signTool verify /pa /v $executable
          if ($LASTEXITCODE -ne 0) { throw "Windows executable signature verification failed." }
      - name: Upload Desktop distributable
        uses: actions/upload-artifact@v7
        with:
          name: racingdaily-windows
          path: composeApp/build/compose/binaries/main/app/**
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Install Android SDK 37
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-37.0"
          cp -a "$ANDROID_HOME/platforms/android-37.0" "$ANDROID_HOME/platforms/android-37"
          sed -i 's/platforms;android-37\.0/platforms;android-37/g; s/<api-level>37\.0<\/api-level>/<api-level>37<\/api-level>/g' "$ANDROID_HOME/platforms/android-37/package.xml"
          sed -i 's/^Pkg.Path=platforms;android-37\.0$/Pkg.Path=platforms;android-37/; s/^AndroidVersion.ApiLevel=37\.0$/AndroidVersion.ApiLevel=37/' "$ANDROID_HOME/platforms/android-37/source.properties"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Decode Android signing key
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > composeApp/release-keystore.jks
      - name: Build signed Android Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/composeApp/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --stacktrace
      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: racingdaily-android-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
