name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build Desktop
        run: gradle :composeApp:compileKotlinDesktop --stacktrace

      - name: Upload Desktop Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RacingDaily-Windows
          path: composeApp/build/compose/binaries/main-release/**/*

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build Android Debug APK
        run: gradle :composeApp:assembleDebug

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RacingDaily-Android
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
